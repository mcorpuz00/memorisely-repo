<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pricing Plans</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="cards-container">
        <a href="/download" class="card">
            <div class="card-top">
                <div class="card-header">
                    <h3 class="card-title">Hobby</h3>
                    <p class="card-price">Free</p>
                </div>
                <p class="includes-text">Includes:</p>
                <ul class="features-list">
                    <li>
                        <span class="checkmark">✓</span>
                        <span>No credit card required</span>
                    </li>
                    <li>
                        <span class="checkmark">✓</span>
                        <span>Limited Agent requests</span>
                    </li>
                    <li>
                        <span class="checkmark">✓</span>
                        <span>Limited Tab completions</span>
                    </li>
                </ul>
            </div>
            <div class="card-footer">
                <span class="card-button">Download</span>
            </div>
        </a>
        <a href="/get-pro" class="card">
            <div class="card-top">
                <div class="card-header">
                    <h3 class="card-title">Pro</h3>
                    <p class="card-price">$20<span class="price-suffix">/&thinsp;mo.</span></p>
                </div>
                <p class="includes-text">Everything in Hobby, plus:</p>
                <ul class="features-list">
                    <li>
                        <span class="checkmark">✓</span>
                        <span>Extended limits on Agent</span>
                    </li>
                    <li>
                        <span class="checkmark">✓</span>
                        <span>Unlimited Tab completions</span>
                    </li>
                    <li>
                        <span class="checkmark">✓</span>
                        <span>Cloud Agents</span>
                    </li>
                    <li>
                        <span class="checkmark">✓</span>
                        <span>Maximum context windows</span>
                    </li>
                </ul>
            </div>
            <div class="card-footer">
                <span class="card-button">Get Pro</span>
            </div>
        </a>
    </div>
</body>
</html>
